name: Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MPLBACKEND: Agg
  PYTHONPATH: src

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[docs]" pytest

      - name: Run tests
        run: python -m pytest tests -q
